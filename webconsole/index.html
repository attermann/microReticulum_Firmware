// Cleanup callbacks for the body's currently-mounted tab. Run before building a new
// tab so the new tab's builder can push its own cleanups into the (now empty) list.
// Critical: take a *build function*, not an already-built node. Building the node
// before clearing cleanups would tear down the new tab's subscriptions immediately.
let bodyCleanups = [];
let bodyKey = null;
function setBody(key, buildFn){
  for (const fn of bodyCleanups) { try { fn(); } catch(_) {} }
  bodyCleanups = [];
  const node = buildFn();
  slots.body.innerHTML = '';
  slots.body.appendChild(node);
  bodyKey = key;
}

// ----- Top bar (in place) -----
function buildTopBar(){
  const root = el('div', { class: 'topbar' });
  const sel = el('select');
  const wsHost = el('span');
  const wsInput = el('input', { type: 'text', placeholder: 'ws://host:port', style: { width: '220px' } });
  wsInput.value = state.wsUrl.get();
  wsInput.oninput = (e) => state.wsUrl.set(e.target.value);
  const connectBtn = el('button');
  const disconnectBtn = el('button', null, 'Disconnect');
  const autoCheckbox = el('input', { type: 'checkbox' });
  autoCheckbox.checked = state.autoReconnect.get();
  autoCheckbox.onchange = (e) => state.autoReconnect.set(e.target.checked);
  const autoLabel = el('label', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px', cursor: 'pointer', color: 'var(--muted)' }, title: 'Reconnect automatically after a reboot to capture early boot logs' }, [autoCheckbox, 'auto-reconnect']);
  const pill = el('span', { class: 'pill' });
  const opts = [['serial','Serial'], ['ble','Bluetooth'], ['ws','WebSocket']];
  for (const [v, lbl] of opts) sel.appendChild(el('option', { value: v }, lbl));
  sel.value = state.transportName.get();
  sel.onchange = (e) => state.transportName.set(e.target.value);
  connectBtn.onclick = doConnect;
  disconnectBtn.onclick = doDisconnect;

  root.appendChild(el('strong', null, 'RNode Console'));
  root.appendChild(el('span', { class: 'sep' }));
  root.appendChild(el('label', null, 'Transport: '));
  root.appendChild(sel);
  root.appendChild(wsHost);
  root.appendChild(connectBtn);
  root.appendChild(disconnectBtn);
  root.appendChild(autoLabel);
  root.appendChild(el('span', { class: 'spacer' }));
  root.appendChild(pill);

  function update(){
    const conn = state.conn.get();
    const tname = state.transportName.get();
    const reconnecting = state.reconnecting.get();
    const connecting = conn.state === 'connecting' && !reconnecting;
    const connected = conn.state === 'connected';
    sel.disabled = connecting || connected || reconnecting;
    if (sel.value !== tname) sel.value = tname;
    wsHost.innerHTML = '';
    if (tname === 'ws') {
      wsHost.appendChild(wsInput);
      if (document.activeElement !== wsInput && wsInput.value !== state.wsUrl.get()) wsInput.value = state.wsUrl.get();
      wsInput.disabled = connecting || connected || reconnecting;
    }
    connectBtn.disabled = connecting || connected || reconnecting;
    connectBtn.textContent = connecting ? 'Connecting…' : 'Connect';
    // Disconnect is also the cancel-reconnect button while reconnecting.
    disconnectBtn.disabled = !connected && !reconnecting;
    if (autoCheckbox.checked !== state.autoReconnect.get()) autoCheckbox.checked = state.autoReconnect.get();
    let txt = 'Disconnected', cls = 'st-idle';
    if (reconnecting) { txt = 'Reconnecting…'; cls = 'st-connecting'; }
    else if (connecting) { txt = 'Connecting…'; cls = 'st-connecting'; }
    else if (connected) { txt = 'Connected' + (conn.info ? ` (${conn.info})` : ''); cls = 'st-ok'; }
    else if (conn.state === 'error') { txt = 'Error: ' + (conn.info || ''); cls = 'st-err'; }
    pill.className = 'pill ' + cls;
    pill.textContent = txt;
  }
  update();
  state.conn.subscribe(update);
  state.transportName.subscribe(update);
  state.wsUrl.subscribe(update);
  state.autoReconnect.subscribe(update);
  state.reconnecting.subscribe(update);
  return root;
}
slots.topbar.appendChild(buildTopBar());

// ----- Tab bar (in place) -----
function buildTabBar(){
  const root = el('div', { class: 'tabbar' });
  // Info merged into Node Status; that's now the always-available landing tab.
  const tabs = [
    { id: 'status', label: 'Node Status' },
    { id: 'nodeconfig', label: 'Node Config' },
    { id: 'config', label: 'Transport Config' },
    { id: 'logs', label: 'Logs' },
  ];
  const buttons = {};
  for (const t of tabs) {
    const b = el('button', { class: 'tab', onclick: () => state.activeTab.set(t.id) }, t.label);
    buttons[t.id] = b;
    root.appendChild(b);
  }
  // Transport Config is only meaningful when microReticulum is part of the
  // build — detected by the presence of any namespace with id < 100 (RNS
  // reserves 1-99 for built-in namespaces per RNode_Firmware.ino comments;
  // 100+ is for app namespaces like 'general' which exists even with HAS_RNS
  // undefined). Legacy firmware that doesn't speak Provisioning at all leaves
  // state.schema = null, in which case we also hide the tab.
  function transportConfigVisible(){
    const schema = state.schema.get();
    if (!schema || !Array.isArray(schema.namespaces)) return false;
    return schema.namespaces.some(n => Number(n.id) < 100);
  }
  function update(){
    const active = state.activeTab.get();
    // Treat "reconnecting" as not-yet-connected so per-tab actions don't fire
    // against a transport that's still being re-established.
    const connected = state.conn.get().state === 'connected' && !state.reconnecting.get();
    const showCfg = transportConfigVisible();
    // legacySupported starts null (not yet probed) — show Node Config until we
    // confirm the device doesn't respond, to avoid hiding it before the probe
    // completes on slower devices.
    const showNcfg = state.legacySupported.get() !== false;
    for (const t of tabs) {
      const b = buttons[t.id];
      b.classList.toggle('active', active === t.id);
      b.disabled = !connected && t.id !== 'status';
      if (t.id === 'config') b.style.display = showCfg ? '' : 'none';
      if (t.id === 'nodeconfig') b.style.display = showNcfg ? '' : 'none';
    }
    // Redirect away from any hidden tab so the user isn't on an invisible body.
    if (!showCfg && active === 'config') state.activeTab.set('status');
    if (!showNcfg && active === 'nodeconfig') state.activeTab.set('status');
  }
  update();
  state.activeTab.subscribe(update);
  state.conn.subscribe(update);
  state.reconnecting.subscribe(update);
  state.schema.subscribe(update);
  state.legacySupported.subscribe(update);
  return root;
}
slots.tabbar.appendChild(buildTabBar());

// ----- Tab bodies -----

function buildStatusTab(){
  const root = el('div', { class: 'tab-body' });
  function row(label, val, unit) {
    if (val == null) return null;
    return el('tr', null, [el('td', null, label), el('td', null, val + (unit ? ' ' + unit : ''))]);
  }
  function section(title, rows) {
    const r = rows.filter(x => x != null);
    if (r.length === 0) return null;
    return el('div', { class: 'status-sec' }, [el('h3', null, title), el('table', { class: 'kv' }, r)]);
  }
  function update(){
    root.innerHTML = '';
    const conn = state.conn.get();
    const connected = conn.state === 'connected';
    const info = state.info.get();
    // Reboot banner: shown when EITHER the Provisioning subsystem has staged
    // reboot-required changes (info.needsReboot) OR a Node Config save touched
    // a reboot-required section (state.nodeCfgNeedsReboot). Cleared on reboot.
    if ((info && info.needsReboot) || state.nodeCfgNeedsReboot.get()) {
      root.appendChild(el('div', { class: 'notice', style: { display: 'flex', alignItems: 'center', gap: '12px' } }, [
        el('span', { style: { flex: '1' } }, 'Reboot recommended to apply committed changes.'),
        el('button', { class: 'primary', onclick: reboot, disabled: !connected }, 'Reboot now'),
      ]));
    }
    if (!connected) {
      root.appendChild(el('em', null, 'Select a transport and click Connect.'));
      return;
    }

    // ---- Device section (merged from former Info tab) ----
    const ncDev = state.nodeCfgDeviceInfo.get();
    const devRows = [
      info ? row('Firmware', String(info.firmwareVersion ?? '')) : null,
      info ? row('Schema version', String(info.schemaVersion ?? '')) : null,
      ncDev && ncDev.board    != null ? row('Board',    `${BOARD_NAMES[ncDev.board] || 'Unknown'} (0x${ncDev.board.toString(16).padStart(2,'0')})`) : null,
      ncDev && ncDev.platform != null ? row('Platform', `${PLATFORM_NAMES[ncDev.platform] || 'Unknown'} (0x${ncDev.platform.toString(16).padStart(2,'0')})`) : null,
      ncDev && ncDev.mcu      != null ? row('MCU',      `${MCU_NAMES[ncDev.mcu] || 'Unknown'} (0x${ncDev.mcu.toString(16).padStart(2,'0')})`) : null,
      info ? row('Needs reboot', info.needsReboot ? 'yes' : 'no') : null,
    ];
    const devSection = section('Device', devRows);
    if (devSection) root.appendChild(devSection);

    // ---- Live status sections (driven by CMD_STAT_*) ----
    const s = state.nodeStatus.get();
    const batStates = ['unknown','discharging','charging','charged'];
    const liveSections = [
      section('Radio link', [
        row('Last RSSI', s.lastRssi, 'dBm'),
        row('Last SNR', s.lastSnr != null ? s.lastSnr.toFixed(2) : null, 'dB'),
        row('Current RSSI', s.currentRssi, 'dBm'),
        row('Noise floor', s.noiseFloor, 'dBm'),
        row('Interference', s.interferenceRssi != null ? s.interferenceRssi + ' dBm' : null),
      ]),
      section('Channel', [
        row('Airtime (short)', s.airtimeShort != null ? (s.airtimeShort * 100).toFixed(2) : null, '%'),
        row('Airtime (long)', s.airtimeLong != null ? (s.airtimeLong * 100).toFixed(2) : null, '%'),
        row('Utilization (short)', s.channelUtilShort != null ? (s.channelUtilShort * 100).toFixed(2) : null, '%'),
        row('Utilization (long)', s.channelUtilLong != null ? (s.channelUtilLong * 100).toFixed(2) : null, '%'),
      ]),
      section('Counters', [row('RX packets', s.rxPackets), row('TX packets', s.txPackets)]),
      section('PHY parameters', [
        row('Symbol time', s.symbolTimeUs, 'µs'),
        row('Symbol rate', s.symbolRate, 'sym/s'),
        row('Preamble symbols', s.preambleSymbols),
        row('Preamble time', s.preambleTimeMs, 'ms'),
        row('CSMA slot', s.csmaSlotMs, 'ms'),
        row('DIFS', s.difsMs, 'ms'),
      ]),
      section('CSMA', [row('CW band', s.cwBand), row('CW min', s.cwMin), row('CW max', s.cwMax)]),
      section('Power', [
        row('Battery', s.batteryPercent != null ? `${s.batteryPercent}% (${batStates[s.batteryState || 0]})` : null),
        row('Temperature', s.temperatureC, '°C'),
      ]),
    ].filter(x => x != null);
    for (const sec of liveSections) root.appendChild(sec);

    if (!devSection && liveSections.length === 0) {
      root.appendChild(el('em', null, 'Waiting for status frames…'));
    }

    // ---- Danger zone (always at the bottom when connected) ----
    root.appendChild(el('h3', null, 'Danger zone'));
    root.appendChild(el('div', { style: { display: 'flex', gap: '8px' } }, [
      el('button', { onclick: reboot, disabled: !connected }, 'Reboot'),
      el('button', { onclick: factoryReset, disabled: !connected }, 'Factory reset'),
    ]));
  }
  update();
  bodyCleanups.push(state.nodeStatus.subscribe(update));
  bodyCleanups.push(state.info.subscribe(update));
  bodyCleanups.push(state.conn.subscribe(update));
  bodyCleanups.push(state.nodeCfgDeviceInfo.subscribe(update));
  bodyCleanups.push(state.nodeCfgNeedsReboot.subscribe(update));
  // Auto-fetch device info on first activation when connected so board/platform/MCU
  // appear without the user having to visit a separate sub-tab.
  if (state.conn.get().state === 'connected' && !state.nodeCfgDeviceInfo.get() && legacy) {
    legacy.readDeviceInfo().then(d => state.nodeCfgDeviceInfo.set(d)).catch(e => console.error('Node Status device info fetch:', e));
  }
  return root;
}

function formatFieldValueForInput(field, value){
  if (value == null) return '';
  if (field.type === FT.Bytes) {
    if (value instanceof Uint8Array) return Array.from(value).map(b => b.toString(16).padStart(2, '0')).join('');
    return '';
  }
  if (field.type === FT.BytesList) {
    if (!Array.isArray(value)) return '';
    return value.map(e => e instanceof Uint8Array
      ? Array.from(e).map(b => b.toString(16).padStart(2, '0')).join('')
      : '').join('\n');
  }
  return String(value);
}

// Parse a multi-line hex string into an array of Uint8Array. One entry per
// non-blank line; whitespace within a line is stripped (so users can paste
// hex with separators). Lines with odd length are rejected by returning null
// so the caller can hold off updating the draft until the user finishes typing.
function parseBytesListHex(text){
  if (text == null || text === '') return [];
  const out = [];
  const lines = String(text).split(/\r?\n/);
  for (const raw of lines) {
    const h = raw.replace(/[^0-9a-fA-F]/g, '');
    if (h.length === 0) continue;
    if (h.length % 2 !== 0) return null;  // not finished typing this line
    const u = new Uint8Array(h.length / 2);
    for (let i = 0; i < u.length; ++i) u[i] = parseInt(h.substr(i*2, 2), 16);
    out.push(u);
  }
  return out;
}

function buildFieldRow(nsId, f, ctx){
  const c = _ctxOr(ctx);
  const row = el('div', { class: 'field' });
  const labelEl = el('label');
  const labelText = el('span', null, f.label || f.name);
  const badges = el('span', { style: { display: 'inline-flex', gap: '4px' } });
  labelEl.appendChild(labelText);
  labelEl.appendChild(badges);
  const inputHost = el('div');
  const errEl = el('div', { class: 'err' });
  row.appendChild(labelEl);
  row.appendChild(inputHost);
  row.appendChild(errEl);

  const ro = !!(f.flags & FF.READ_ONLY);
  const secret = !!(f.flags & FF.SECRET);
  const reboot = !!(f.flags & FF.REBOOT_REQUIRED);

  // Build input ONCE; we never recreate it on subsequent state changes.
  let input;
  if (f.type === FT.Bool) {
    input = el('input', { type: 'checkbox', disabled: ro });
    input.addEventListener('input', () => setDraftValue(nsId, f, input.checked, c));
  } else if (f.type === FT.Int) {
    input = el('input', {
      type: 'number', step: '1', disabled: ro,
      min: f.minI != null ? Number(f.minI) : undefined,
      max: f.maxI != null ? Number(f.maxI) : undefined,
    });
    input.addEventListener('input', () => {
      const v = input.value === '' ? null : parseInt(input.value, 10);
      setDraftValue(nsId, f, v, c);
    });
  } else if (f.type === FT.Float) {
    input = el('input', {
      type: 'number', step: 'any', disabled: ro,
      min: f.minF != null ? Number(f.minF) : undefined,
      max: f.maxF != null ? Number(f.maxF) : undefined,
    });
    input.addEventListener('input', () => {
      const v = input.value === '' ? null : parseFloat(input.value);
      setDraftValue(nsId, f, v, c);
    });
  } else if (f.type === FT.String) {
    const big = f.maxLen && Number(f.maxLen) > 80;
    if (big) {
      input = el('textarea', { rows: '3', maxlength: Number(f.maxLen), disabled: ro });
    } else {
      input = el('input', { type: secret ? 'password' : 'text', maxlength: f.maxLen ? Number(f.maxLen) : undefined, disabled: ro });
    }
    input.addEventListener('input', () => setDraftValue(nsId, f, input.value, c));
  } else if (f.type === FT.Enum) {
    input = el('select', { disabled: ro });
    if (Array.isArray(f.enumValues)) {
      const labels = Array.isArray(f.enumLabels) ? f.enumLabels : null;
      for (let i = 0; i < f.enumValues.length; ++i) {
        const ev = Number(f.enumValues[i]);
        input.appendChild(el('option', { value: String(ev) }, labels && labels[i] ? labels[i] : String(ev)));
      }
    }
    input.addEventListener('change', () => setDraftValue(nsId, f, parseInt(input.value, 10), c));
  } else if (f.type === FT.Bytes) {
    input = el('input', { type: 'text', placeholder: f.maxLen ? `hex (max ${f.maxLen} bytes)` : 'hex', disabled: ro });
    input.addEventListener('input', () => {
      const t = input.value.replace(/[^0-9a-fA-F]/g, '');
      if (t.length % 2 !== 0) return;
      const u8 = new Uint8Array(t.length / 2);
      for (let i = 0; i < u8.length; ++i) u8[i] = parseInt(t.substr(i * 2, 2), 16);
      setDraftValue(nsId, f, u8, c);
    });
  } else if (f.type === FT.BytesList) {
    // One hex entry per line. elementSize fixes per-entry length; maxCount
    // limits total entries. Both are zero/null when unconstrained.
    const sz = f.elementSize != null ? Number(f.elementSize) : 0;
    const max = f.maxCount != null ? Number(f.maxCount) : 0;
    const hints = [];
    if (sz > 0) hints.push(`${sz} bytes / ${sz*2} hex chars per entry`);
    if (max > 0) hints.push(`up to ${max} entries`);
    hints.push('one per line');
    input = el('textarea', { rows: '5', disabled: ro, placeholder: 'hex (' + hints.join(', ') + ')',
      style: { fontFamily: 'ui-monospace, Menlo, monospace', minWidth: '360px' } });
    input.addEventListener('input', () => {
      const list = parseBytesListHex(input.value);
      // null = an in-progress odd-length line. Wait for the user to finish
      // before mutating the draft — prevents lossy round-trip while typing.
      if (list == null) return;
      setDraftValue(nsId, f, list, c);
    });
  } else {
    input = el('span', null, '(unknown type)');
  }
  // Optional unit suffix (e.g. "Hz", "dBm") rendered next to the input.
  if (f.unit) {
    inputHost.style.display = 'flex';
    inputHost.style.alignItems = 'center';
    inputHost.style.gap = '6px';
    inputHost.appendChild(input);
    inputHost.appendChild(el('span', { class: 'unit', style: { color: 'var(--muted)' } }, f.unit));
  } else {
    inputHost.appendChild(input);
  }

  function update(){
    const nsObj = c.state.get()[nsId] || { committed: {}, draft: {} };
    const value = getEffectiveValue(nsId, f, c);
    const isDraft = f.id in nsObj.draft;
    // Sync input value ONLY if it's not currently focused — preserves cursor/selection while typing.
    if (document.activeElement !== input) {
      if (f.type === FT.Bool) {
        input.checked = !!value;
      } else if (f.type === FT.Enum) {
        const want = String(Number(value));
        if (input.value !== want) input.value = want;
      } else {
        const fmt = formatFieldValueForInput(f, value);
        if (input.value !== fmt) input.value = fmt;
      }
    }
    // Badges
    badges.innerHTML = '';
    if (ro) badges.appendChild(el('span', { class: 'badge ro' }, 'read-only'));
    if (secret) badges.appendChild(el('span', { class: 'badge secret' }, 'secret'));
    if (reboot) badges.appendChild(el('span', { class: 'badge reboot' }, '↻ reboot'));
    if (isDraft) badges.appendChild(el('span', { class: 'badge draft' }, '• draft'));
    // Errors — only surface validation errors for fields the user actually edited.
    // Untouched fields may carry firmware "sentinel" defaults (e.g. radio.frequency=0)
    // that fall outside the advertised min/max range; the firmware ignores them as
    // "unconfigured", so we should not flag them as user-facing errors.
    const serverErr = c.errors && (c.errors.get()[nsId] || {})[f.id];
    const valErr = (isDraft && validateValue(f, value)) || null;
    const msg = serverErr ? 'server: ' + serverErr : valErr;
    errEl.textContent = msg || '';
    row.classList.toggle('has-err', !!msg);
  }
  return {
    row,
    update,
    fieldId: f.id,
    // hasDraftError: only count validation errors for drafted fields toward
    // the Save-button gate, for the same reason as the display above.
    hasDraftError: () => {
      const draft = (c.state.get()[nsId] || {}).draft || {};
      if (!(f.id in draft)) return false;
      return !!validateValue(f, getEffectiveValue(nsId, f, c));
    },
  };
}

function buildNamespacePanel(nsId){
  const wrap = el('div');
  const schema = state.schema.get();
  const ns = schema && schema.namespaces.find(n => n.id === nsId);
  if (!ns) { wrap.appendChild(el('em', null, 'Unknown namespace')); return { node: wrap, cleanups: [] }; }

  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save namespace');
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  saveBtn.onclick = () => saveNamespace(nsId);
  revertBtn.onclick = () => revertNamespace(nsId);
  refreshBtn.onclick = () => refreshNamespace(nsId);
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(refreshBtn);
  wrap.appendChild(toolbar);

  const fieldHandles = [];
  for (const f of ns.fields) {
    const h = buildFieldRow(nsId, f);
    wrap.appendChild(h.row);
    fieldHandles.push(h);
  }

  function updateButtons(){
    const hasDraft = nsDraftCount(nsId) > 0;
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    saveBtn.disabled = !hasDraft || anyErr;
    saveBtn.classList.toggle('primary', hasDraft && !anyErr);
    revertBtn.disabled = !hasDraft;
  }
  function updateAll(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  updateAll();

  const cleanups = [
    state.nsState.subscribe(updateAll),
    state.nsServerErrors.subscribe(updateAll),
  ];
  return { node: wrap, cleanups };
}

function buildConfigTab(){
  const root = el('div', { class: 'tab-body config-tab no-pad' });
  const sidenav = el('div', { class: 'sidenav' });
  const detail = el('div', { class: 'sidenav-detail' });
  root.appendChild(sidenav);
  root.appendChild(detail);

  // Cleanup for the inner-mounted namespace panel
  let nsCleanups = [];
  function mountNs(nsId){
    for (const fn of nsCleanups) { try { fn(); } catch(_) {} }
    nsCleanups = [];
    detail.innerHTML = '';
    if (nsId == null) { detail.appendChild(el('em', null, 'Select a namespace from the left.')); return; }
    const loaded = state.nsLoaded.get()[nsId];
    if (!loaded) {
      detail.appendChild(el('em', null, 'Loading…'));
      // Kick off fetch; when nsLoaded fires for this id, the subscription below remounts.
      fetchNamespaceIfNeeded(nsId);
      return;
    }
    const { node, cleanups } = buildNamespacePanel(nsId);
    nsCleanups = cleanups;
    detail.appendChild(node);
  }

  const navButtons = new Map(); // nsId -> button
  function rebuildSidenav(){
    sidenav.innerHTML = '';
    navButtons.clear();
    const schema = state.schema.get();
    if (!schema) { sidenav.appendChild(el('em', { style: { padding: '8px 16px', color: 'var(--muted)' } }, 'No schema')); return; }
    const activeNs = state.activeNsTab.get();
    for (const ns of schema.namespaces) {
      const b = el('button', { class: 'sidenav-btn' + (ns.id === activeNs ? ' active' : ''), onclick: () => state.activeNsTab.set(ns.id) });
      const lbl = el('span', null, ns.name);
      const dot = el('span', { class: 'dot', style: { display: nsDraftCount(ns.id) > 0 ? '' : 'none' } });
      b.appendChild(lbl);
      b.appendChild(dot);
      sidenav.appendChild(b);
      navButtons.set(ns.id, { btn: b, dot });
    }
  }
  function updateNavActive(){
    const active = state.activeNsTab.get();
    for (const [nsId, { btn }] of navButtons) {
      btn.classList.toggle('active', nsId === active);
    }
  }
  function updateNavDots(){
    for (const [nsId, { dot }] of navButtons) {
      dot.style.display = nsDraftCount(nsId) > 0 ? '' : 'none';
    }
  }

  rebuildSidenav();
  // If schema arrived but no ns selected, pick the first.
  const sch = state.schema.get();
  if (sch && state.activeNsTab.get() == null && sch.namespaces.length > 0) {
    state.activeNsTab.set(sch.namespaces[0].id);
  }
  mountNs(state.activeNsTab.get());

  bodyCleanups.push(state.schema.subscribe(() => { rebuildSidenav(); mountNs(state.activeNsTab.get()); }));
  bodyCleanups.push(state.activeNsTab.subscribe((nsId) => { updateNavActive(); mountNs(nsId); }));
  bodyCleanups.push(state.nsLoaded.subscribe(() => {
    const cur = state.activeNsTab.get();
    if (cur != null && state.nsLoaded.get()[cur]) mountNs(cur);
  }));
  bodyCleanups.push(state.nsState.subscribe(updateNavDots));
  bodyCleanups.push(() => { for (const fn of nsCleanups) try { fn(); } catch(_) {} });
  return root;
}

// ===== Node Config tab =====
// Master/detail with a statically-defined sidenav (sections from
// NODE_CONFIG_SCHEMA). Each section is either standard schema-driven (Radio,
// WiFi, Display) or custom (Device Info, Mode, Bluetooth, EEPROM).

function ncfgDraftCount(sectionId){
  const s = state.nodeCfgState.get()[sectionId];
  return s ? Object.keys(s.draft || {}).length : 0;
}

async function ncfgFetchSection(sectionId){
  if (!legacy) return;
  if (state.nodeCfgLoaded.get()[sectionId] || state.nodeCfgLoading.get()[sectionId]) return;
  state.nodeCfgLoading.update(s => { s[sectionId] = true; });
  try {
    const committed = await legacy.readSection(sectionId);
    state.nodeCfgState.update(s => { s[sectionId] = { committed, draft: {} }; });
    state.nodeCfgLoaded.update(s => { s[sectionId] = true; });
  } catch (e) {
    console.error('Node Config read failed:', e);
    showToast('Failed to read ' + sectionId + ': ' + e.message, 'err');
  } finally {
    state.nodeCfgLoading.update(s => { delete s[sectionId]; });
  }
}

async function ncfgSaveSection(sectionId){
  if (!legacy) return;
  const sec = NODE_CONFIG_SCHEMA[sectionId];
  if (!sec) return;
  const obj = state.nodeCfgState.get()[sectionId];
  if (!obj || Object.keys(obj.draft).length === 0) return;
  try {
    await legacy.writeSection(sectionId, obj.draft);
    // Treat the draft as the new committed state. (We don't re-read because many
    // legacy CMDs are write-only — no read counterpart on the firmware side.)
    state.nodeCfgState.update(s => {
      const committed = { ...obj.committed, ...obj.draft };
      s[sectionId] = { committed, draft: {} };
    });
    recomputeHasDraft(NCFG_CTX);
    const label = sec.label || sectionId;
    showToast(`Saved ${label} settings`, 'ok');
    // If any saveTrailer op was CMD_CONF_SAVE, the radio config was persisted —
    // remind the user that the next boot enters TNC mode.
    const trailerOps = sec.saveTrailer
      ? (Array.isArray(sec.saveTrailer) ? sec.saveTrailer : [sec.saveTrailer])
      : [];
    if (trailerOps.some(op => op.cmd === CMD_CONF_SAVE)) {
      showToast('Radio config persisted to EEPROM (device will boot in TNC mode)', 'warn');
    }
    // Hint the user to reboot when the saved section's changes take effect at
    // boot time (radio, wifi). Reflected in the Node Status reboot banner.
    if (sec.requiresReboot) state.nodeCfgNeedsReboot.set(true);
  } catch (e) {
    showToast('Save failed: ' + e.message, 'err');
  }
}

function ncfgRevertSection(sectionId){
  state.nodeCfgState.update(s => {
    if (s[sectionId]) s[sectionId].draft = {};
  });
  recomputeHasDraft(NCFG_CTX);
}

function buildNcfgSchemaPanel(sectionId){
  const sec = NODE_CONFIG_SCHEMA[sectionId];
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, sec.label));

  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save ' + sec.label);
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  saveBtn.onclick = () => ncfgSaveSection(sectionId);
  revertBtn.onclick = () => ncfgRevertSection(sectionId);
  refreshBtn.onclick = () => {
    state.nodeCfgLoaded.update(s => { delete s[sectionId]; });
    ncfgFetchSection(sectionId);
  };
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(refreshBtn);
  wrap.appendChild(toolbar);

  if (sec.saveTrailerNote) {
    wrap.appendChild(el('div', { class: 'ncfg-trailer' }, sec.saveTrailerNote));
  }

  const fieldHandles = [];
  for (const f of sec.fields) {
    const h = buildFieldRow(sectionId, f, NCFG_CTX);
    wrap.appendChild(h.row);
    fieldHandles.push(h);
  }

  function updateButtons(){
    const hasDraft = ncfgDraftCount(sectionId) > 0;
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    saveBtn.disabled = !hasDraft || anyErr;
    saveBtn.classList.toggle('primary', hasDraft && !anyErr);
    revertBtn.disabled = !hasDraft;
  }
  function updateAll(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  updateAll();
  const cleanups = [
    state.nodeCfgState.subscribe(updateAll),
  ];
  return { node: wrap, cleanups };
}

function buildNcfgDeviceInfoPanel(){
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'Device Info'));
  const refreshBtn = el('button', null, 'Refresh');
  refreshBtn.onclick = async () => {
    if (!legacy) return;
    refreshBtn.disabled = true;
    refreshBtn.textContent = 'Reading…';
    try {
      const info = await legacy.readDeviceInfo();
      state.nodeCfgDeviceInfo.set(info);
    } catch (e) {
      showToast('Device info read failed: ' + e.message, 'err');
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.textContent = 'Refresh';
    }
  };
  const toolbar = el('div', { class: 'ns-toolbar' }, [refreshBtn]);
  wrap.appendChild(toolbar);

  const table = el('table', { class: 'kv-info' });
  wrap.appendChild(table);

  function hexOf(u8){
    if (!u8) return '';
    return Array.from(u8).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function row(label, val, cls){
    const td = el('td', cls ? { class: cls } : null, val == null ? '—' : val);
    return el('tr', null, [el('td', null, label), td]);
  }
  function update(){
    table.innerHTML = '';
    const info = state.nodeCfgDeviceInfo.get();
    if (!info) {
      table.appendChild(el('tr', null, [el('td', null, ''), el('td', null,
        el('em', null, 'Click Refresh to read device information.'))]));
      return;
    }
    const boardLbl = info.board != null ? `${BOARD_NAMES[info.board] || 'Unknown'} (0x${info.board.toString(16).padStart(2,'0')})` : null;
    const platLbl = info.platform != null ? `${PLATFORM_NAMES[info.platform] || 'Unknown'} (0x${info.platform.toString(16).padStart(2,'0')})` : null;
    const mcuLbl = info.mcu != null ? `${MCU_NAMES[info.mcu] || 'Unknown'} (0x${info.mcu.toString(16).padStart(2,'0')})` : null;
    table.appendChild(row('Board', boardLbl));
    table.appendChild(row('Platform', platLbl));
    table.appendChild(row('MCU', mcuLbl));
    table.appendChild(row('Firmware version', info.fwVersion));
    if (info.devHash) table.appendChild(row('Device hash', hexOf(info.devHash), 'hash'));
    if (info.fwHashTarget) table.appendChild(row('FW hash (target)', hexOf(info.fwHashTarget), 'hash'));
    if (info.fwHashActual) table.appendChild(row('FW hash (actual)', hexOf(info.fwHashActual), 'hash'));
    if (info.bootloaderHash) table.appendChild(row('Bootloader hash', hexOf(info.bootloaderHash), 'hash'));
    if (info.partitionHash) table.appendChild(row('Partition hash', hexOf(info.partitionHash), 'hash'));
  }
  update();
  const cleanups = [ state.nodeCfgDeviceInfo.subscribe(update) ];
  return { node: wrap, cleanups };
}

function buildNcfgRadioPanel(){
  // Combined Mode + Radio panel. Mode (HOST/TNC) selector sits above the
  // radio fields. Radio config only persists for TNC mode (the HOST flow
  // re-issues radio params on every boot via individual KISS opcodes, so the
  // EEPROM-stored values are unused). Field rows are disabled when HOST is
  // selected — but kept rendered so the user sees what would be persisted.
  const sec = NODE_CONFIG_SCHEMA.radio;
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'Radio'));

  // Persisted mode (from EEPROM byte 0xA7). Source of truth for the Mode
  // selector's initial state. Null until EEPROM has been read.
  const persistedMode = () => {
    const ee = state.nodeCfgEeprom.get();
    if (!ee || ee.length <= 0xA7) return null;
    return ee[0xA7] === CONF_OK_BYTE ? 'tnc' : 'host';
  };
  let targetMode = persistedMode() || 'host';   // what the user has selected

  // --- Mode selector ---
  const modeRow = el('div', { class: 'mode-current', style: { display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' } });
  const modeLabel = el('span');
  const modeSelect = el('select');
  modeSelect.appendChild(el('option', { value: 'host' }, 'HOST (KISS radio modem)'));
  modeSelect.appendChild(el('option', { value: 'tnc' },  'TNC (boot into embedded RNS)'));
  modeRow.appendChild(el('strong', null, 'Boot mode: '));
  modeRow.appendChild(modeSelect);
  modeRow.appendChild(modeLabel);
  wrap.appendChild(modeRow);

  wrap.appendChild(el('p', { style: { color: 'var(--muted)', margin: '8px 0 14px' } }, [
    'In ', el('strong', null, 'HOST'), ' mode the device acts as a KISS radio modem driven by this connection — radio settings are sent from the host at runtime and the EEPROM-stored values below are unused. In ',
    el('strong', null, 'TNC'), ' mode the device boots its embedded Reticulum stack and uses the radio config persisted below; the serial port carries RNS log output and the device stops responding to legacy KISS commands.'
  ]));

  // --- Toolbar ---
  const toolbar = el('div', { class: 'ns-toolbar' });
  const saveBtn = el('button', null, 'Save Radio');
  const revertBtn = el('button', null, 'Revert');
  const refreshBtn = el('button', null, 'Refresh');
  toolbar.appendChild(saveBtn);
  toolbar.appendChild(revertBtn);
  toolbar.appendChild(refreshBtn);
  wrap.appendChild(toolbar);

  // --- Field rows (reused via buildFieldRow) ---
  const fieldHandles = [];
  const fieldRows = el('div');
  for (const f of sec.fields) {
    const h = buildFieldRow('radio', f, NCFG_CTX);
    fieldHandles.push(h);
    fieldRows.appendChild(h.row);
  }
  wrap.appendChild(fieldRows);

  // Find each input element so we can enable/disable based on target mode.
  function setRadioFieldsEnabled(enabled){
    for (const h of fieldHandles) {
      const inputs = [];
      // Walk the row to collect inputs/selects/textareas (we built them above).
      const collect = (n) => {
        if (!n || !n._children) return;
        for (const c of n._children) {
          if (c && (c.tagName === 'input' || c.tagName === 'select' || c.tagName === 'textarea')) inputs.push(c);
          collect(c);
        }
      };
      collect(h.row);
      for (const inp of inputs) inp.disabled = !enabled;
    }
    fieldRows.style.opacity = enabled ? '' : '0.55';
  }

  // --- Auto-read EEPROM so we know the persisted mode ---
  if (!state.nodeCfgEeprom.get() && legacy) {
    legacy.readEeprom().then(u => state.nodeCfgEeprom.set(u)).catch(e => {
      console.error('Radio panel EEPROM read failed:', e);
    });
  }
  // --- Auto-fetch radio field values (custom panels skip the default
  //     auto-fetch in mountSection) ---
  if (!state.nodeCfgLoaded.get()['radio']) ncfgFetchSection('radio');

  // --- React to changes ---
  function syncFromState(){
    const pm = persistedMode();
    modeLabel.textContent = pm == null ? '(reading EEPROM…)'
      : pm === targetMode ? `currently ${pm.toUpperCase()}`
      : `currently ${pm.toUpperCase()} → will switch to ${targetMode.toUpperCase()} on Save`;
    // Set select value to targetMode without firing 'change' (avoid loop)
    if (modeSelect.value !== targetMode) modeSelect.value = targetMode;
    // Disable radio inputs when target is HOST.
    setRadioFieldsEnabled(targetMode === 'tnc');
    updateButtons();
  }
  function updateButtons(){
    const nsObj = state.nodeCfgState.get()['radio'] || { committed: {}, draft: {} };
    const hasFieldDraft = Object.keys(nsObj.draft).length > 0;
    const pm = persistedMode();
    const modeChanged = (pm != null) && (pm !== targetMode);
    // Save is meaningful when:
    //   - target=TNC AND we need to (re)write fields/conf (mode changed OR drafts)
    //   - target=HOST AND we need to clear conf (mode changed from TNC)
    const anyErr = fieldHandles.some(h => h.hasDraftError());
    const canSave = !anyErr && ((targetMode === 'tnc' && (modeChanged || hasFieldDraft))
                                || (targetMode === 'host' && modeChanged));
    saveBtn.disabled = !canSave;
    saveBtn.classList.toggle('primary', canSave);
    revertBtn.disabled = !hasFieldDraft && !modeChanged;
  }
  function updateFields(){
    for (const h of fieldHandles) h.update();
    updateButtons();
  }
  syncFromState();
  updateFields();

  modeSelect.addEventListener('change', () => { targetMode = modeSelect.value; syncFromState(); });
  saveBtn.onclick = async () => {
    if (!legacy) return;
    const pm = persistedMode();
    try {
      if (targetMode === 'tnc') {
        // Confirm with the user — TNC mode means the device stops responding
        // to KISS at the next boot.
        if (pm !== 'tnc') {
          if (!confirm('Switch to TNC mode? The device will boot into embedded RNS at the next reset and stop responding to KISS on this connection.')) return;
        }
        // Persist any drafted radio fields, then bring the radio online, then CMD_CONF_SAVE.
        const nsObj = state.nodeCfgState.get()['radio'] || { committed:{}, draft:{} };
        if (Object.keys(nsObj.draft).length > 0) {
          await legacy.writeSection('radio', nsObj.draft);
          // Treat drafts as committed.
          state.nodeCfgState.update(s => {
            const obj = s['radio'] || { committed: {}, draft: {} };
            s['radio'] = { committed: { ...obj.committed, ...obj.draft }, draft: {} };
          });
          recomputeHasDraft(NCFG_CTX);
        } else {
          // No drafts but mode is changing → still ensure radio online + persist
          // current lora_* via CMD_CONF_SAVE.
          await legacy.setMode(true);
        }
        state.nodeCfgNeedsReboot.set(true);
        showToast('Radio config persisted (device will boot in TNC mode)', 'warn');
      } else {
        // Target HOST: clear TNC marker. EEPROM radio values stay but ADDR_CONF_OK=0x00.
        if (!confirm('Switch to HOST mode? Cleared TNC config — device boots into HOST (KISS) at the next reset.')) return;
        await legacy.setMode(false);
        state.nodeCfgNeedsReboot.set(true);
        showToast('TNC config cleared — reboot to apply', 'ok');
      }
      // Refresh EEPROM so the persisted-mode indicator updates.
      try { state.nodeCfgEeprom.set(await legacy.readEeprom()); } catch(_) {}
    } catch (e) {
      showToast('Save failed: ' + e.message, 'err');
    }
  };
  revertBtn.onclick = () => {
    state.nodeCfgState.update(s => { if (s['radio']) s['radio'].draft = {}; });
    recomputeHasDraft(NCFG_CTX);
    targetMode = persistedMode() || 'host';
    syncFromState();
  };
  refreshBtn.onclick = () => {
    state.nodeCfgLoaded.update(s => { delete s['radio']; });
    ncfgFetchSection('radio');
    if (legacy) legacy.readEeprom().then(u => state.nodeCfgEeprom.set(u)).catch(()=>{});
  };

  const cleanups = [
    state.nodeCfgEeprom.subscribe(() => {
      // When the EEPROM read lands, default targetMode to what's persisted.
      const pm = persistedMode();
      if (pm != null) targetMode = pm;
      syncFromState();
    }),
    state.nodeCfgState.subscribe(updateFields),
  ];
  return { node: wrap, cleanups };
}

// Address annotations for the EEPROM hex viewer.
const EEPROM_REGIONS = [
  { from: 0x00, to: 0x0A, label: 'Identity (product/model/HW/serial/date)' },
  { from: 0x9B, to: 0x9B, label: 'INFO_LOCK' },
  { from: 0x9C, to: 0x9C, label: 'SF' },
  { from: 0x9D, to: 0x9D, label: 'CR' },
  { from: 0x9E, to: 0x9E, label: 'TXP' },
  { from: 0x9F, to: 0xA2, label: 'BW (BE32)' },
  { from: 0xA3, to: 0xA6, label: 'FREQ (BE32)' },
  { from: 0xA7, to: 0xA7, label: 'CONF_OK' },
  { from: 0xB0, to: 0xB0, label: 'BT enable' },
  { from: 0xB1, to: 0xB8, label: 'Display' },
  { from: 0xB9, to: 0xB9, label: 'IA disable' },
  { from: 0xBA, to: 0xBB, label: 'WiFi enable / channel' },
];

function buildHexView(u8, regions){
  const wrap = el('div', { class: 'hexview' });
  if (!u8 || u8.length === 0) {
    wrap.appendChild(el('em', { style: { color: 'var(--muted)' } }, 'No data — click "Read EEPROM" above.'));
    return wrap;
  }
  const marks = new Array(u8.length).fill(false);
  if (Array.isArray(regions)) {
    for (const r of regions) for (let i = r.from; i <= r.to && i < u8.length; ++i) marks[i] = true;
  }
  for (let off = 0; off < u8.length; off += 16) {
    const offStr = '0x' + off.toString(16).padStart(4, '0');
    const bytesEl = el('span', { class: 'hx-bytes' });
    let asciiStr = '';
    for (let i = 0; i < 16 && off + i < u8.length; ++i) {
      const b = u8[off + i];
      const span = el('span', marks[off + i] ? { class: 'hx-mark' } : null, b.toString(16).padStart(2, '0'));
      bytesEl.appendChild(span);
      bytesEl.appendChild(document.createTextNode(' '));
      asciiStr += (b >= 0x20 && b <= 0x7E) ? String.fromCharCode(b) : '.';
    }
    const row = el('div', { class: 'hx-row' }, [
      el('span', { class: 'hx-off' }, offStr),
      bytesEl,
      el('span', { class: 'hx-ascii' }, '|' + asciiStr + '|'),
    ]);
    wrap.appendChild(row);
  }
  if (regions && regions.length) {
    const legend = el('div', { class: 'hx-legend' });
    legend.appendChild(el('span', { class: 'hx-mark' }, ' '));
    legend.appendChild(document.createTextNode('Highlighted bytes correspond to known config regions.'));
    wrap.appendChild(legend);
  }
  return wrap;
}

function downloadBlob(name, data){
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { try { document.body.removeChild(a); URL.revokeObjectURL(url); } catch(_) {} }, 200);
}

function buildNcfgEepromPanel(){
  const wrap = el('div', { class: 'ncfg-section' });
  wrap.appendChild(el('h2', null, 'EEPROM'));

  const toolbar = el('div', { class: 'eeprom-toolbar' });
  const readBtn = el('button', null, 'Read EEPROM');
  const readCfgBtn = el('button', null, 'Read WiFi config sector');
  const backupBtn = el('button', null, 'Backup EEPROM to file');
  const status = el('span', { style: { color: 'var(--muted)' } });
  readBtn.onclick = async () => {
    if (!legacy) return;
    readBtn.disabled = true; status.textContent = 'Reading EEPROM…';
    try { state.nodeCfgEeprom.set(await legacy.readEeprom()); status.textContent = ''; }
    catch (e) { status.textContent = ''; showToast('EEPROM read failed: ' + e.message, 'err'); }
    finally { readBtn.disabled = false; }
  };
  readCfgBtn.onclick = async () => {
    if (!legacy) return;
    readCfgBtn.disabled = true; status.textContent = 'Reading WiFi config sector…';
    try { state.nodeCfgCfgSector.set(await legacy.readCfgSector()); status.textContent = ''; }
    catch (e) { status.textContent = ''; showToast('Config sector read failed: ' + e.message, 'err'); }
    finally { readCfgBtn.disabled = false; }
  };
  backupBtn.onclick = async () => {
    if (!legacy) return;
    backupBtn.disabled = true; status.textContent = 'Reading EEPROM for backup…';
    try {
      const u8 = await legacy.readEeprom();
      state.nodeCfgEeprom.set(u8);
      const ts = new Date().toISOString().replace(/[:.]/g,'-').replace(/T/,'_').slice(0,19);
      downloadBlob(`eeprom-backup-${ts}.bin`, u8);
      status.textContent = '';
    } catch (e) { status.textContent = ''; showToast('Backup failed: ' + e.message, 'err'); }
    finally { backupBtn.disabled = false; }
  };
  toolbar.appendChild(readBtn);
  toolbar.appendChild(readCfgBtn);
  toolbar.appendChild(backupBtn);
  toolbar.appendChild(status);
  wrap.appendChild(toolbar);

  // EEPROM hex view
  const eeHost = el('div');
  wrap.appendChild(el('h3', null, 'EEPROM (reserved region, 200 bytes)'));
  wrap.appendChild(eeHost);
  // WiFi config sector hex view
  const cfgHost = el('div');
  wrap.appendChild(el('h3', null, 'WiFi config sector (256 bytes)'));
  wrap.appendChild(cfgHost);

  function updateEe(){
    eeHost.innerHTML = '';
    eeHost.appendChild(buildHexView(state.nodeCfgEeprom.get(), EEPROM_REGIONS));
  }
  function updateCfg(){
    cfgHost.innerHTML = '';
    cfgHost.appendChild(buildHexView(state.nodeCfgCfgSector.get(),
      [ { from: 0x00, to: 0x20, label: 'SSID' },
        { from: 0x21, to: 0x41, label: 'PSK' },
        { from: 0x42, to: 0x45, label: 'Static IP' },
        { from: 0x46, to: 0x49, label: 'Netmask' } ]));
  }
  updateEe();
  updateCfg();

  // Danger zone: EEPROM wipe
  const danger = el('div', { class: 'danger-zone' });
  danger.appendChild(el('h3', null, 'Wipe EEPROM'));
  danger.appendChild(el('p', null,
    'Unlocks and erases the entire 200-byte reserved EEPROM region. The device will reboot. ' +
    'Identity bytes (product/model/HW rev/serial) are NOT preserved — you will need to re-provision the device using rnodeconf -f.'));
  const wipeBtn = el('button', null, 'Wipe EEPROM');
  wipeBtn.onclick = async () => {
    if (!legacy) return;
    const typed = prompt('Type WIPE in uppercase to confirm EEPROM erase:');
    if (typed !== 'WIPE') { showToast('Wipe cancelled', 'ok'); return; }
    try {
      await legacy.wipeEeprom();
      showToast('EEPROM wipe sent — device is erasing and rebooting', 'warn');
    } catch (e) { showToast('Wipe failed: ' + e.message, 'err'); }
  };
  danger.appendChild(wipeBtn);
  wrap.appendChild(danger);

  const cleanups = [
    state.nodeCfgEeprom.subscribe(updateEe),
    state.nodeCfgCfgSector.subscribe(updateCfg),
  ];
  return { node: wrap, cleanups };
}

function buildNodeConfigTab(){
  const root = el('div', { class: 'tab-body config-tab no-pad' });
  const sidenav = el('div', { class: 'sidenav' });
  const detail = el('div', { class: 'sidenav-detail' });
  root.appendChild(sidenav);
  root.appendChild(detail);

  let secCleanups = [];
  function mountSection(sectionId){
    for (const fn of secCleanups) { try { fn(); } catch(_) {} }
    secCleanups = [];
    detail.innerHTML = '';
    const sec = NODE_CONFIG_SCHEMA[sectionId];
    if (!sec) { detail.appendChild(el('em', null, 'Unknown section.')); return; }
    let h;
    if (sec.custom === 'device_info')      h = buildNcfgDeviceInfoPanel();
    else if (sec.custom === 'radio')        h = buildNcfgRadioPanel();
    else if (sec.custom === 'bluetooth')    h = buildNcfgBluetoothPanel();
    else if (sec.custom === 'eeprom')       h = buildNcfgEepromPanel();
    else                                    h = buildNcfgSchemaPanel(sectionId);
    secCleanups = h.cleanups;
    detail.appendChild(h.node);
    // For schema-driven sections, kick off an async read if not loaded yet.
    if (!sec.custom && !state.nodeCfgLoaded.get()[sectionId]) {
      ncfgFetchSection(sectionId);
    }
  }

  const navButtons = new Map();
  function rebuildSidenav(){
    sidenav.innerHTML = '';
    navButtons.clear();
    const active = state.activeNodeCfgTab.get();
    for (const sectionId of Object.keys(NODE_CONFIG_SCHEMA)) {
      const sec = NODE_CONFIG_SCHEMA[sectionId];
      const b = el('button', {
        class: 'sidenav-btn' + (sectionId === active ? ' active' : ''),
        onclick: () => state.activeNodeCfgTab.set(sectionId),
      });
      const lbl = el('span', null, sec.label);
      const dot = el('span', { class: 'dot', style: { display: ncfgDraftCount(sectionId) > 0 ? '' : 'none' } });
      b.appendChild(lbl);
      b.appendChild(dot);
      sidenav.appendChild(b);
      navButtons.set(sectionId, { btn: b, dot });
    }
  }
  function updateNavActive(){
    const active = state.activeNodeCfgTab.get();
    for (const [sectionId, { btn }] of navButtons) btn.classList.toggle('active', sectionId === active);
  }
  function updateNavDots(){
    for (const [sectionId, { dot }] of navButtons) dot.style.display = ncfgDraftCount(sectionId) > 0 ? '' : 'none';
  }

  rebuildSidenav();
  mountSection(state.activeNodeCfgTab.get());

  bodyCleanups.push(state.activeNodeCfgTab.subscribe((id) => { updateNavActive(); mountSection(id); }));
  bodyCleanups.push(state.nodeCfgState.subscribe(updateNavDots));
  bodyCleanups.push(() => { for (const fn of secCleanups) try { fn(); } catch(_) {} });
  return root;
}

// ----- Logs tab (persistent container) -----
const logsBuffer = [];
const logsListeners = new Set();
let logsContainer = null;
let logsFollowing = true;
let logsSavedScrollTop = 0;

function ensureLogsContainer(){
  if (logsContainer) return;
  logsContainer = el('div', { class: 'logs' });
  logsContainer.addEventListener('scroll', () => {
    logsFollowing = (logsContainer.scrollHeight - logsContainer.scrollTop - logsContainer.clientHeight) < 16;
    if (followPill) followPill.style.display = logsFollowing ? 'none' : '';
  });
  for (const line of logsBuffer) logsContainer.appendChild(el('div', { class: 'log-line' }, line));
  logsListeners.add((newLines) => {
    for (const l of newLines) logsContainer.appendChild(el('div', { class: 'log-line' }, l));
    while (logsContainer.childNodes.length > 1000) logsContainer.removeChild(logsContainer.firstChild);
    if (logsFollowing && logsContainer.isConnected) logsContainer.scrollTop = logsContainer.scrollHeight;
  });
}

function clearLogs(){
  logsBuffer.length = 0;
  if (logsContainer) {
    while (logsContainer.firstChild) logsContainer.removeChild(logsContainer.firstChild);
    // After clearing, we're effectively at the bottom of an empty view — re-engage tail.
    logsFollowing = true;
    if (followPill) followPill.style.display = 'none';
  }
}

let followPill = null;
function buildLogsTab(){
  ensureLogsContainer();
  const root = el('div', { class: 'tab-body logs-tab no-pad' });
  const toolbar = el('div', { class: 'logs-toolbar' }, [
    el('button', { onclick: clearLogs, title: 'Clear the log viewer (does not affect the device)' }, 'Clear'),
    el('span', { class: 'spacer' }),
  ]);
  followPill = el('button', { class: 'follow-pill', style: { display: logsFollowing ? 'none' : '' }, onclick: () => {
    logsFollowing = true; followPill.style.display = 'none';
    logsContainer.scrollTop = logsContainer.scrollHeight;
  } }, '▼ Follow tail');
  root.appendChild(toolbar);
  root.appendChild(logsContainer);
  root.appendChild(followPill);
  // Restore scroll on (re)attach. Use rAF so layout is computed before we set
  // scrollTop — queueMicrotask runs before layout and the assignment clamps to 0.
  requestAnimationFrame(() => {
    if (logsFollowing) logsContainer.scrollTop = logsContainer.scrollHeight;
    else logsContainer.scrollTop = logsSavedScrollTop;
  });
  bodyCleanups.push(() => {
    // Save scroll position so we can restore on next mount.
    if (logsContainer && logsContainer.isConnected) {
      logsSavedScrollTop = logsContainer.scrollTop;
      logsFollowing = (logsContainer.scrollHeight - logsContainer.scrollTop - logsContainer.clientHeight) < 16;
    }
  });
  return root;
}

// ----- Bottom bar (in place) -----
function buildBottomBar(){
  const wrap = el('div');
  function update(){
    wrap.innerHTML = '';
    const hasLocal = state.hasDraft.get();
    const hasFw = state.firmwareHasDraft.get();
    if (!hasLocal && !hasFw) return;
    const drafts = state.nsState.get();
    let nsCount = 0, fieldCount = 0;
    for (const nsId in drafts) {
      const n = Object.keys(drafts[nsId].draft || {}).length;
      if (n > 0) { nsCount++; fieldCount += n; }
    }
    // Commit and Discard operate on the firmware's staged draft, which only
    // exists once at least one namespace has been Saved. Until then, both
    // buttons are no-ops on the device side, so disable them.
    const label = hasFw
      ? `${fieldCount} field${fieldCount !== 1 ? 's' : ''} pending in ${nsCount} namespace${nsCount !== 1 ? 's' : ''}`
      : `${fieldCount} local edit${fieldCount !== 1 ? 's' : ''} — save a namespace to enable Commit / Discard`;
    const bar = el('div', { class: 'bottombar' }, [
      el('span', null, label),
      el('span', { class: 'spacer' }),
      el('button', { onclick: discardAll, disabled: !hasFw, title: hasFw ? '' : 'No firmware-side draft to discard' }, 'Discard all'),
      el('button', { class: 'primary', onclick: commitAll, disabled: !hasFw, title: hasFw ? '' : 'No firmware-side draft to commit' }, 'Commit all'),
    ]);
    wrap.appendChild(bar);
  }
  update();
  state.hasDraft.subscribe(update);
  state.firmwareHasDraft.subscribe(update);
  state.nsState.subscribe(update);
  return wrap;
}
slots.bottombar.appendChild(buildBottomBar());

// ===== Self-tests =====
async function runSelfTests(){
  const out = [];
  const ok = (n, c, info) => out.push((c ? 'OK  ' : 'FAIL') + ' ' + n + (info ? ' [' + info + ']' : ''));
  try {
    const p = new Packer();
    p.arr(3); p.int(1); p.int(42);
    p.map(2);
    p.int(1); p.str('hello');
    p.int(2); p.bool(true);
    const u = new Unpacker(p.result());
    const v = u.next();
    ok('msgpack envelope', Array.isArray(v) && v.length === 3);
    ok('msgpack op', v[0] === 1);
    ok('msgpack seq', v[1] === 42);
    ok('msgpack payload Map', v[2] instanceof Map);
    ok('msgpack map[1]', v[2].get(1) === 'hello');
    ok('msgpack map[2]', v[2].get(2) === true);
  } catch (e) { ok('msgpack roundtrip', false, e.message); }
  try {
    const p2 = new Packer(); p2.int(-300); p2.int(70000); p2.float(3.14159265);
    const u2 = new Unpacker(p2.result());
    ok('msgpack int -300', u2.next() === -300);
    ok('msgpack uint 70000', u2.next() === 70000);
    const f = u2.next();
    ok('msgpack float', Math.abs(f - 3.14159265) < 1e-9);
  } catch (e) { ok('msgpack numerics', false, e.message); }
  try {
    const payload = new Uint8Array([0x01, FEND, FESC, 0xFF, FEND, 0x02]);
    const enc = kissEncode(0x86, payload);
    let got = null;
    const dec = new KissDecoder((cmd, p) => { got = { cmd, p }; });
    dec.feed(enc);
    ok('kiss cmd', got && got.cmd === 0x86);
    ok('kiss payload length', got && got.p.length === payload.length);
    let same = true;
    if (got) for (let i = 0; i < payload.length; ++i) if (got.p[i] !== payload[i]) { same = false; break; }
    ok('kiss payload bytes', same);
  } catch (e) { ok('kiss roundtrip', false, e.message); }
  try {
    const st = {};
    decodeStatusFrame(0x27, new Uint8Array([1, 88]), st);
    ok('status BAT state', st.batteryState === 1);
    ok('status BAT %', st.batteryPercent === 88);
    decodeStatusFrame(0x26, new Uint8Array([0,8, 1,0, 0,4, 0,10, 0,1, 0,2]), st);
    ok('status PHYPRM symTime', st.symbolTimeUs === 8);
    ok('status PHYPRM symRate', st.symbolRate === 256);
    ok('status PHYPRM difs', st.difsMs === 2);
    decodeStatusFrame(0x25, new Uint8Array([0x27,0x10, 0x13,0x88, 0x03,0xE8, 0x07,0xD0, 60, 100, 0xFF]), st);
    ok('status CHTM airtimeShort', Math.abs(st.airtimeShort - 1.0) < 1e-9);
    ok('status CHTM airtimeLong', Math.abs(st.airtimeLong - 0.5) < 1e-9);
    ok('status CHTM currentRssi', st.currentRssi === 60 - RSSI_OFFSET);
    ok('status CHTM noiseFloor', st.noiseFloor === 100 - RSSI_OFFSET);
    ok('status CHTM interference null', st.interferenceRssi === null);
    decodeStatusFrame(0x23, new Uint8Array([57]), st);
    ok('status RSSI single', st.lastRssi === 57 - RSSI_OFFSET);
    decodeStatusFrame(0x24, new Uint8Array([0xFC]), st);
    ok('status SNR signed', Math.abs(st.lastSnr - (-1.0)) < 1e-9);
    // CMD_STAT_TEMP: firmware adds PMU_TEMP_OFFSET=120; we subtract it back.
    decodeStatusFrame(0x29, new Uint8Array([171]), st);
    ok('status TEMP 171→51°C', st.temperatureC === 51);
    decodeStatusFrame(0x29, new Uint8Array([89]), st);   // PMU_TEMP_MIN-1 sentinel
    ok('status TEMP sentinel→null', st.temperatureC === null);
    decodeStatusFrame(0x29, new Uint8Array([145]), st);  // 145 - 120 = 25°C
    ok('status TEMP 145→25°C', st.temperatureC === 25);
  } catch (e) { ok('status decoder', false, e.message); }
  // Firmware version is rendered as decimal "major.minor" (rnodeconf convention),
  // not hex. MIN_VERS=0x56 → "86", not "56".
  try {
    const fmt = (b) => b.length >= 2 ? `${b[0]}.${b[1].toString().padStart(2,'0')}` : null;
    ok('fwVersion 0x01,0x56 → 1.86', fmt(new Uint8Array([0x01, 0x56])) === '1.86');
    ok('fwVersion 0x02,0x0a → 2.10', fmt(new Uint8Array([0x02, 0x0a])) === '2.10');
  } catch (e) { ok('fwVersion format', false, e.message); }
  // BytesList: round-trip through MsgPack packer/unpacker.
  try {
    const a = new Uint8Array([0x01,0x02,0x03,0x04, 0x05,0x06,0x07,0x08, 0x09,0x0a,0x0b,0x0c, 0x0d,0x0e,0x0f,0x10]);
    const b = new Uint8Array([0xff, 0xee, 0xdd, 0xcc]);
    const p = new Packer();
    packTypedValue(p, FT.BytesList, [a, b]);
    const decoded = new Unpacker(p.result()).next();
    ok('BytesList round-trip is array', Array.isArray(decoded) && decoded.length === 2);
    ok('BytesList entry 0 length', decoded[0].length === 16);
    ok('BytesList entry 0 bytes',
      decoded[0] instanceof Uint8Array && decoded[0][0] === 0x01 && decoded[0][15] === 0x10);
    ok('BytesList entry 1 bytes',
      decoded[1] instanceof Uint8Array && decoded[1][0] === 0xff && decoded[1][3] === 0xcc);
    // Empty list
    const p2 = new Packer(); packTypedValue(p2, FT.BytesList, []);
    const dec2 = new Unpacker(p2.result()).next();
    ok('BytesList empty', Array.isArray(dec2) && dec2.length === 0);
  } catch (e) { ok('BytesList round-trip', false, e.message); }
  // valuesEqual for BytesList
  try {
    const x1 = [new Uint8Array([1,2,3]), new Uint8Array([4,5])];
    const x2 = [new Uint8Array([1,2,3]), new Uint8Array([4,5])];
    const x3 = [new Uint8Array([1,2,3]), new Uint8Array([4,6])];
    const x4 = [new Uint8Array([1,2,3])];
    ok('BytesList valuesEqual same', valuesEqual(x1, x2));
    ok('BytesList valuesEqual differs', !valuesEqual(x1, x3));
    ok('BytesList valuesEqual length differs', !valuesEqual(x1, x4));
  } catch (e) { ok('BytesList valuesEqual', false, e.message); }
  // parseBytesListHex
  try {
    const r = parseBytesListHex('aabb ccdd\n11 22 33 44');
    ok('parseBytesListHex line count', r.length === 2);
    ok('parseBytesListHex strips separators',
      r[0].length === 4 && r[0][0] === 0xaa && r[0][3] === 0xdd);
    ok('parseBytesListHex line 2 length', r[1].length === 4 && r[1][3] === 0x44);
    // Odd hex returns null (incomplete byte)
    ok('parseBytesListHex odd nibble → null', parseBytesListHex('abc') === null);
    // Empty input → empty list
    ok('parseBytesListHex empty', Array.isArray(parseBytesListHex('')) && parseBytesListHex('').length === 0);
  } catch (e) { ok('parseBytesListHex', false, e.message); }
  // validateValue for BytesList with constraints
  try {
    const f = { type: FT.BytesList, elementSize: 16, maxCount: 4 };
    const ok16 = new Uint8Array(16);
    const ok16b = new Uint8Array(16);
    ok('BytesList validate empty', validateValue(f, []) === null);
    ok('BytesList validate ok', validateValue(f, [ok16, ok16b]) === null);
    ok('BytesList validate too few bytes', validateValue(f, [new Uint8Array(15)]) != null);
    ok('BytesList validate too many entries',
      validateValue(f, [ok16, ok16b, new Uint8Array(16), new Uint8Array(16), new Uint8Array(16)]) != null);
  } catch (e) { ok('BytesList validate', false, e.message); }
  // ----- Node Config codec round-trips -----
  try {
    // be32 frequency encode/decode (867500000 Hz = 0x33B4FFE0)
    const freq = NCFG_ENC.be32.enc(867500000);
    ok('ncfg be32 enc length', freq.length === 4);
    ok('ncfg be32 enc bytes', freq[0]===0x33 && freq[1]===0xB4 && freq[2]===0xFF && freq[3]===0xE0);
    ok('ncfg be32 dec', NCFG_ENC.be32.dec(freq) === 867500000);
    // u8 SF
    ok('ncfg u8 enc', NCFG_ENC.u8.enc(7)[0] === 7);
    ok('ncfg u8 dec', NCFG_ENC.u8.dec(new Uint8Array([12])) === 12);
    // i8 TXP signed
    ok('ncfg i8 enc -9',  NCFG_ENC.i8.enc(-9)[0] === (256 - 9));
    ok('ncfg i8 dec -1',  NCFG_ENC.i8.dec(new Uint8Array([0xFF])) === -1);
    ok('ncfg i8 dec  22', NCFG_ENC.i8.dec(new Uint8Array([22])) === 22);
    // str null-terminated
    const sBytes = NCFG_ENC.str.encStr('hello', 32);
    ok('ncfg str null-term', sBytes.length === 6 && sBytes[5] === 0);
    // ip4 round-trip
    const ip = NCFG_ENC.ip4.enc('192.168.1.42');
    ok('ncfg ip4 enc', ip[0]===192 && ip[1]===168 && ip[2]===1 && ip[3]===42);
    ok('ncfg ip4 dec', NCFG_ENC.ip4.dec(ip) === '192.168.1.42');
    ok('ncfg ip4 DHCP zero', NCFG_ENC.ip4.dec(new Uint8Array([0,0,0,0])) === '0.0.0.0');
  } catch (e) { ok('ncfg codec', false, e.message); }
  // KISS-frame assembly for the legacy opcodes
  try {
    // BT_CTRL "on" → FEND 0x46 0x01 FEND
    const f = kissEncode(CMD_BT_CTRL, new Uint8Array([0x01]));
    ok('ncfg BT_CTRL frame', f.length === 4 && f[0]===0xC0 && f[1]===0x46 && f[2]===0x01 && f[3]===0xC0);
    // CMD_CONF_SAVE with empty payload → FEND 0x53 FEND
    const cs = kissEncode(CMD_CONF_SAVE, new Uint8Array(0));
    ok('ncfg CMD_CONF_SAVE frame', cs.length === 3 && cs[0]===0xC0 && cs[1]===0x53 && cs[2]===0xC0);
    // CMD_UNLOCK_ROM with magic byte
    const ur = kissEncode(CMD_UNLOCK_ROM, new Uint8Array([ROM_UNLOCK_BYTE]));
    ok('ncfg ROM unlock frame', ur.length === 4 && ur[1]===0x59 && ur[2]===0xF8);
  } catch (e) { ok('ncfg frames', false, e.message); }
  // LegacyClient.query() round-trip via a synthetic transport.
  try {
    const sent = [];
    const fakeT = { send: async (b) => { sent.push(b); }, onBytes: ()=>{} };
    const fakeProv = { onLegacyFrame: null, _onFrame: () => {} };
    const lc = new LegacyClient(fakeProv, fakeT);
    let resolvedVal = null;
    lc.query(CMD_FREQUENCY, NCFG_ENC.be32.query(), 1000).then(p => { resolvedVal = NCFG_ENC.be32.dec(p); });
    // Yield once so the lc.query's send() promise can land its handler.
    await Promise.resolve();
    // Simulate the device's echoed response by invoking onLegacyFrame.
    fakeProv.onLegacyFrame(CMD_FREQUENCY, new Uint8Array([0x33, 0xB4, 0xFF, 0xE0]));
    await Promise.resolve(); await Promise.resolve();
    ok('LegacyClient query echo', resolvedVal === 867500000);
    ok('LegacyClient query sent one frame', sent.length === 1);
  } catch (e) { ok('LegacyClient query', false, e.message); }
  // Hex-viewer rendering
  try {
    const u = new Uint8Array(32);
    for (let i = 0; i < 32; ++i) u[i] = i;
    const view = buildHexView(u, [{ from: 0x9C, to: 0x9C, label: 'SF' }]);
    // Top-level wrapper has class hexview; should contain 2 rows (16-byte each)
    let rowCount = 0;
    function walk(n) { if (!n || !n._children) return; for (const c of n._children) { if (c._classes && c._classes.has && c._classes.has('hx-row')) rowCount++; walk(c); } }
    walk(view);
    ok('hexview row count', rowCount === 2);
  } catch (e) { ok('hexview', false, e.message); }
  document.getElementById('app').innerHTML = '<pre>' + out.join('\n') + '</pre>';
}
if (location.search.indexOf('selftest=1') !== -1) runSelfTests();
})();
</script>
