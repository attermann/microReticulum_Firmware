# microReticulum native build — example runtime config.
#
# Copy this file to `microreticulum.conf` and edit for your hardware.
# Whichever directory you launch the binary from is searched first;
# alternatively set the MR_CONFIG environment variable to a full path.
#
# Pin numbers semantics:
#   - On Linux native ([env:native], board = linux_hardware): each
#     pin_* value is interpreted as a BCM line number on the chip
#     identified by `gpio_chip` below. Use `gpioinfo gpiochip0` to
#     see what's available on your board. -1 disables a pin.
#   - On macOS native ([env:native-macos], board = cross_platform):
#     pin values are arbitrary sim-pin IDs in the range 0-63. They
#     don't reference real hardware; they just need to be unique
#     and within range. The values below are fine as-is for macOS.
#
# pin_cs / pin_sclk / pin_mosi / pin_miso are NOT bound via libgpiod
# on Linux — they're owned by the spidev kernel driver via the Pi's
# device tree. List them here for completeness; only pin_cs actually
# reaches the modem driver's digitalWrite(_ss, ...) call, which goes
# through Portduino's sim path (CS is toggled by spidev itself).

# ----- Storage / device paths -----
data_dir       = ./state
spi_dev        = /dev/spidev0.0
gpio_chip      = /dev/gpiochip0
spi_speed_hz   = 2000000

# ----- Pin map -----
# Uncomment one of the board sections below and adjust as needed.
# Keep the unused sections commented out (or delete them).

# ----- Waveshare SX126x LoRa HAT for Raspberry Pi -----
# pin_cs          = 8       # BCM 8  (CE0) — handled by spidev
# pin_reset       = 22      # BCM 22
# pin_busy        = 23      # BCM 23
# pin_dio         = 24      # BCM 24 — DIO1
# pin_rxen        = -1
# pin_txen        = -1
# pin_tcxo_enable = -1
# pin_led_rx      = -1
# pin_led_tx      = -1

# ----- LuckFox / FemtoFox + RFM95x LoRa module (SX1276) -----
# Verified against a known-good meshtasticd RF95 config on this board.
# Build with -DMODEM=SX1276 (already the [env:native] default).
# Override the gpio_chip line at the top of this file to:
#   gpio_chip      = /dev/gpiochip1
# The pin values below are gpiochip1 line offsets (kernel GPIO number
# minus 32 for this Rockchip SoC: e.g. GPIO48 → line 16).
# pin_cs          = 16    # GPIO48 / pin  6 — owned by spidev (CE0), not bound via libgpiod
# pin_reset       = 25    # GPIO57 / pin 13
# pin_busy        = 22    # GPIO54 / pin 16 — SX127x silicon has no BUSY; line is reserved but unused by driver
# pin_dio         = 23    # GPIO55 / pin 17 — DIO0 (meshtasticd calls it IRQ)
# pin_rxen        = 24    # GPIO56 / pin 12 — meshtasticd sets this; SX127x driver does NOT toggle it (4-arg setPins)
# pin_txen        = -1    # not present on RFM95x
# pin_tcxo_enable = -1
# pin_led_rx      = -1
# pin_led_tx      = -1
# spi_dev / spi_speed_hz: keep /dev/spidev0.0 at 2_000_000 Hz (top of file).

# ----- macOS sim defaults (the in-code defaults) -----
# pin_cs          = 0
# pin_reset       = 1
# pin_busy        = 2
# pin_dio         = 3
# pin_rxen        = 4
# pin_txen        = 5
# pin_tcxo_enable = -1
# pin_sclk        = 6
# pin_mosi        = 7
# pin_miso        = 8
# pin_led_rx      = 9
# pin_led_tx      = 10

# ----- LoRa radio settings -----
# These get written into the EEPROM image on first boot. After that,
# the values stored in ./eeprom are what's used (modify via the host
# protocol or delete ./eeprom to re-seed from this file).
lora_freq_hz   = 915000000
lora_bw_hz     = 125000
lora_sf        = 8
lora_cr        = 5
lora_txp       = 17
